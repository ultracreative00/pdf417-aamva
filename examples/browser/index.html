<!DOCTYPE HTML>
<html>

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>PDF417 AAMVA Barcode Generator</title>

        <link rel="stylesheet" type="text/css" href="main.css">
        <script src="../../lib/pdf417.js" type="text/javascript"></script>

        <script>
            window.onload = function() {
                generate()
            }

            function generate() {
                var code   = document.getElementById("code").value
                var canvas = document.getElementById("barcode")
                var ecl    = parseInt(document.getElementById("ecl").value, 10)
                var ratio  = parseFloat(document.getElementById("ratio").value)

                if (!code.trim()) return

                PDF417.draw(code, canvas, ecl, ratio)
            }

            function download() {
                var canvas = document.getElementById("barcode")
                var a = document.createElement("a")
                a.href = canvas.toDataURL("image/png")
                a.download = "barcode.png"
                a.click()
            }
        </script>
    </head>

    <body>
        <div id="controls">
            <label for="ecl">Error Correction Level (0–8):</label>
            <select id="ecl" onchange="generate()">
                <option value="0">0 – Minimum</option>
                <option value="1">1</option>
                <option value="2">2 – Low</option>
                <option value="3">3</option>
                <option value="4" selected>4 – Standard (AAMVA default)</option>
                <option value="5">5</option>
                <option value="6">6 – High</option>
                <option value="7">7</option>
                <option value="8">8 – Maximum</option>
            </select>

            <label for="ratio">Aspect Ratio:</label>
            <input id="ratio" type="number" value="2" min="0.5" max="10" step="0.1" oninput="generate()" />
        </div>

        <textarea id="code" cols="60" rows="15" placeholder="Enter barcode data here..." oninput="generate()" onchange="generate()"></textarea>

        <div id="barcode-wrap">
            <canvas id="barcode"></canvas>
            <button onclick="download()">Download PNG</button>
        </div>
    </body>
</html>
